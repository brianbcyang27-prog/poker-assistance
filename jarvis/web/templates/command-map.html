<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Agent Command Map</title>
    <link rel="stylesheet" href="/static/css/command-map.css">
</head>
<body>
    <div id="command-map">
        <!-- Background particles -->
        <canvas id="bg-canvas"></canvas>
        
        <!-- Main SVG canvas for hierarchy -->
        <svg id="hierarchy-svg" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Glow filters -->
                <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="blur"/>
                    <feFlood flood-color="#00d4ff" flood-opacity="0.6" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="glow"/>
                    <feMerge>
                        <feMergeNode in="glow"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="blur"/>
                    <feFlood flood-color="#00ff88" flood-opacity="0.6" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="glow"/>
                    <feMerge>
                        <feMergeNode in="glow"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="blur"/>
                    <feFlood flood-color="#ff4466" flood-opacity="0.6" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="glow"/>
                    <feMerge>
                        <feMergeNode in="glow"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <filter id="glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="blur"/>
                    <feFlood flood-color="#ffaa00" flood-opacity="0.6" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="glow"/>
                    <feMerge>
                        <feMergeNode in="glow"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <filter id="glow-white" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="6" result="blur"/>
                    <feFlood flood-color="#ffffff" flood-opacity="0.8" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="glow"/>
                    <feMerge>
                        <feMergeNode in="glow"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <!-- Gradient for energy lines -->
                <linearGradient id="energy-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
                    <stop offset="50%" stop-color="#00d4ff" stop-opacity="1"/>
                    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
                </linearGradient>
                
                <!-- Animated dash pattern -->
                <pattern id="dash-pattern" patternUnits="userSpaceOnUse" width="20" height="1">
                    <line x1="0" y1="0" x2="10" y2="0" stroke="#00d4ff" stroke-width="1"/>
                </pattern>
            </defs>
            
            <!-- Energy lines group -->
            <g id="energy-lines"></g>
            
            <!-- Flow particles group -->
            <g id="flow-particles"></g>
            
            <!-- Nodes will be added here -->
            <g id="nodes"></g>
        </svg>
        
        <!-- Status overlay -->
        <div id="status-overlay">
            <div class="status-item">
                <span class="status-label">SYSTEM</span>
                <span class="status-value" id="system-status">INITIALIZING</span>
            </div>
            <div class="status-item">
                <span class="status-label">AGENTS</span>
                <span class="status-value" id="agent-count">0/0</span>
            </div>
            <div class="status-item">
                <span class="status-label">MISSIONS</span>
                <span class="status-value" id="mission-count">0</span>
            </div>
        </div>
        
        <!-- Active missions panel -->
        <div id="missions-panel">
            <div class="missions-header">
                <span class="missions-title">ACTIVE MISSIONS</span>
                <button class="missions-close" onclick="toggleMissions()">&times;</button>
            </div>
            <div class="missions-content" id="missions-content">
                <div class="mission-empty">No active missions</div>
            </div>
        </div>
        
        <!-- Navigation -->
        <div id="nav-bar">
            <a href="/" class="nav-link">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                </svg>
                HOME
            </a>
            <span class="nav-divider">|</span>
            <span class="nav-current">COMMAND MAP</span>
            <span class="nav-divider">|</span>
            <button class="nav-link" onclick="toggleMissions()">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                MISSIONS
            </button>
        </div>
        
        <!-- Agent detail tooltip -->
        <div id="agent-tooltip" class="tooltip hidden">
            <div class="tooltip-header">
                <span class="tooltip-card-id"></span>
                <span class="tooltip-name"></span>
            </div>
            <div class="tooltip-body">
                <div class="tooltip-row">
                    <span class="tooltip-label">Status</span>
                    <span class="tooltip-value tooltip-state"></span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Role</span>
                    <span class="tooltip-value tooltip-role"></span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Personality</span>
                    <span class="tooltip-value tooltip-personality"></span>
                </div>
            </div>
        </div>
        
        <!-- Agent detail panel -->
        <div id="detail-panel" class="hidden">
            <div class="detail-header">
                <div class="detail-card-badge" id="detail-card-id"></div>
                <div class="detail-title">
                    <h2 id="detail-name">-</h2>
                    <span id="detail-role" class="detail-subtitle">-</span>
                </div>
                <button class="detail-close" onclick="closeDetailPanel()">&times;</button>
            </div>
            
            <div class="detail-body">
                <div class="detail-section">
                    <div class="detail-label">STATUS</div>
                    <div id="detail-state" class="detail-state-badge">IDLE</div>
                </div>
                
                <div class="detail-section">
                    <div class="detail-label">THINKING</div>
                    <div id="detail-thinking" class="detail-thinking">No active thoughts</div>
                </div>
                
                <div class="detail-section">
                    <div class="detail-label">CURRENT TASK</div>
                    <div id="detail-task" class="detail-task">No task assigned</div>
                </div>
                
                <div class="detail-section">
                    <div class="detail-label">ABILITIES</div>
                    <div id="detail-abilities" class="detail-abilities"></div>
                </div>
                
                <div class="detail-section">
                    <div class="detail-label">PERSONALITY</div>
                    <div id="detail-personality" class="detail-personality">-</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/command-map.js"></script>
</body>
</html>
