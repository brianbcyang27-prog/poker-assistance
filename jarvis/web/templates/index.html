{% extends "base.html" %}

{% block content %}
<script>
    // Initialize JARVIS Core on load
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const container = document.getElementById('golden-core-container');
            if (container && typeof JarvisCore !== 'undefined') {
                window.jarvisCore = new JarvisCore(container);
            }
        } catch (e) {
            console.warn('JarvisCore init failed:', e);
        }

        try {
            if (typeof JarvisState !== 'undefined') {
                window.jarvisState = new JarvisState();
            }
        } catch (e) {
            console.warn('JarvisState init failed:', e);
        }

        try {
            if (typeof AudioAnalyzer !== 'undefined') {
                window.audioAnalyzer = new AudioAnalyzer();
            }
        } catch (e) {
            console.warn('AudioAnalyzer init failed:', e);
        }

        // Connect state machine to visualization
        if (window.jarvisState) {
            window.jarvisState.onStateChange((state) => {
                if (window.jarvisCore) window.jarvisCore.setState(state);
                const el = document.getElementById('core-state');
                if (el) el.textContent = state.toUpperCase();
            });
        }

        // Initialize command map
        try {
            const mapContainer = document.getElementById('command-map');
            if (mapContainer && typeof CommandMap !== 'undefined') {
                window.commandMap = new CommandMap(mapContainer);
                const response = await fetch('/api/agents/hierarchy');
                const hierarchy = await response.json();
                window.commandMap.update(hierarchy);
            }
        } catch (e) {
            console.log('Agent hierarchy not yet available');
        }

        // Set initial state - always show READY
        const coreStateEl = document.getElementById('core-state');
        if (coreStateEl) coreStateEl.textContent = 'READY';
        if (window.jarvisState) window.jarvisState.set('idle');
    });
</script>
{% endblock %}
