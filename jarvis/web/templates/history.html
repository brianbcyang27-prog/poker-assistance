{% extends "base.html" %}

{% block content %}
<style>
    .history-container {
        max-width: 1000px;
        margin: 80px auto 20px;
        padding: 0 20px;
    }
    
    .history-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }
    
    .history-header h1 {
        font-size: 24px;
        font-weight: 300;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent);
    }
    
    .history-stats {
        display: flex;
        gap: 20px;
        font-size: 12px;
        color: var(--text-secondary);
    }
    
    .stat-value {
        color: var(--accent);
        font-weight: 600;
    }
    
    .history-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    
    .history-item {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .history-item:hover {
        border-color: var(--accent);
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
    }
    
    .history-item-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
    }
    
    .history-preview {
        font-size: 15px;
        color: var(--text-primary);
        flex: 1;
        line-height: 1.4;
    }
    
    .history-meta {
        display: flex;
        gap: 20px;
        font-size: 12px;
        color: var(--text-secondary);
    }
    
    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-secondary);
    }
    
    .empty-state h3 {
        font-size: 18px;
        font-weight: 400;
        margin-bottom: 12px;
    }
    
    .loading {
        text-align: center;
        padding: 40px;
        color: var(--text-secondary);
    }
    
    .pagination {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 24px;
    }
    
    .pagination button {
        padding: 8px 16px;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .pagination button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
    }
    
    .pagination button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    /* Conversation Modal */
    .detail-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 5, 16, 0.9);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(10px);
    }
    
    .detail-modal.open {
        display: flex;
    }
    
    .detail-content {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 16px;
        width: 90%;
        max-width: 700px;
        max-height: 80vh;
        overflow-y: auto;
        padding: 32px;
    }
    
    .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 24px;
    }
    
    .detail-header h2 {
        font-size: 20px;
        font-weight: 400;
        color: var(--text-primary);
        flex: 1;
    }
    
    .detail-close {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 24px;
        padding: 4px;
    }
    
    .detail-close:hover {
        color: var(--accent);
    }
    
    .conversation-messages {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    
    .conversation-msg {
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 14px;
        line-height: 1.5;
        max-width: 85%;
    }
    
    .conversation-msg.user {
        align-self: flex-end;
        background: rgba(0, 240, 255, 0.1);
        border: 1px solid rgba(0, 240, 255, 0.2);
        color: var(--text-primary);
    }
    
    .conversation-msg.assistant {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        color: var(--text-primary);
    }
    
    .conversation-msg pre {
        background: rgba(0, 0, 0, 0.3);
        padding: 8px 12px;
        border-radius: 6px;
        margin: 8px 0;
        overflow-x: auto;
        font-size: 12px;
    }
</style>

<div class="history-container">
    <div class="history-header">
        <h1>Chat History</h1>
        <div class="history-stats">
            <span>Sessions: <span class="stat-value" id="total-count">0</span></span>
        </div>
    </div>
    
    <div id="history-list" class="history-list">
        <div class="loading">Loading history...</div>
    </div>
    
    <div class="pagination">
        <button id="prev-btn" onclick="loadHistory(currentPage - 1)" disabled>Previous</button>
        <button id="next-btn" onclick="loadHistory(currentPage + 1)">Next</button>
    </div>
</div>

<!-- Conversation Modal -->
<div class="detail-modal" id="detail-modal">
    <div class="detail-content">
        <div class="detail-header">
            <h2 id="detail-title">Conversation</h2>
            <button class="detail-close" onclick="closeDetail()">&times;</button>
        </div>
        <div id="detail-body" class="conversation-messages"></div>
    </div>
</div>

<script>
    let currentPage = 0;
    const pageSize = 20;
    
    async function loadHistory(page = 0) {
        currentPage = page;
        const listEl = document.getElementById('history-list');
        listEl.innerHTML = '<div class="loading">Loading history...</div>';
        
        try {
            const response = await fetch(`/api/chat/sessions?limit=${pageSize}&offset=${page * pageSize}`);
            const data = await response.json();
            
            document.getElementById('total-count').textContent = data.total;
            
            if (data.sessions.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <h3>No conversations yet</h3>
                        <p>Start chatting with JARVIS to see history here</p>
                    </div>
                `;
                return;
            }
            
            listEl.innerHTML = data.sessions.map(s => `
                <div class="history-item" onclick="showDetail('${s.session_id}')">
                    <div class="history-item-header">
                        <div class="history-preview">${escapeHtml(s.preview || 'New conversation')}</div>
                    </div>
                    <div class="history-meta">
                        <span>${s.message_count} messages</span>
                        <span>${formatDate(s.last_at)}</span>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('prev-btn').disabled = page === 0;
            document.getElementById('next-btn').disabled = data.sessions.length < pageSize;
            
        } catch (error) {
            listEl.innerHTML = '<div class="empty-state">Failed to load history</div>';
        }
    }
    
    async function showDetail(sessionId) {
        const modal = document.getElementById('detail-modal');
        const titleEl = document.getElementById('detail-title');
        const bodyEl = document.getElementById('detail-body');
        
        modal.classList.add('open');
        titleEl.textContent = 'Loading...';
        bodyEl.innerHTML = '';
        
        try {
            const response = await fetch(`/api/chat/history/${sessionId}`);
            const messages = await response.json();
            
            titleEl.textContent = `Session: ${sessionId}`;
            
            bodyEl.innerHTML = messages.map(m => `
                <div class="conversation-msg ${m.role}">
                    ${escapeHtml(m.content)}
                </div>
            `).join('');
            
            // Scroll to bottom
            bodyEl.scrollTop = bodyEl.scrollHeight;
        } catch (error) {
            titleEl.textContent = 'Error';
            bodyEl.innerHTML = '<p>Failed to load conversation</p>';
        }
    }
    
    function closeDetail() {
        document.getElementById('detail-modal').classList.remove('open');
    }
    
    function formatDate(isoString) {
        if (!isoString) return '';
        const date = new Date(isoString);
        return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    document.addEventListener('DOMContentLoaded', () => loadHistory());
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDetail();
    });
</script>

<!-- Nav cluster CSS -->
<style>
    #nav-cluster {
        position: fixed;
        bottom: 28px;
        left: 24px;
        display: flex;
        gap: 6px;
        z-index: 100;
        opacity: 0.15;
        transition: opacity 0.5s ease;
    }
    #nav-cluster:hover { opacity: 1; }
    .nav-dot {
        width: 32px; height: 32px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: rgba(10, 15, 30, 0.85);
        color: var(--text-secondary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        backdrop-filter: blur(12px);
        transition: all 0.3s ease;
    }
    .nav-dot:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(0, 212, 255, 0.1);
        transform: scale(1.1);
    }
    .nav-dot.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(0, 212, 255, 0.12);
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
    }
</style>
{% endblock %}
