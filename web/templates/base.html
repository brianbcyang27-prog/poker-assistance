<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS</title>
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Three.js (local) -->
    <script src="/static/vendor/three.min.js"></script>
    <script src="/static/vendor/CopyShader.js"></script>
    <script src="/static/vendor/LuminosityHighPassShader.js"></script>
    <script src="/static/vendor/EffectComposer.js"></script>
    <script src="/static/vendor/RenderPass.js"></script>
    <script src="/static/vendor/ShaderPass.js"></script>
    <script src="/static/vendor/UnrealBloomPass.js"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
    <div id="app">
        <!-- Three.js Canvas Container -->
        <div id="jarvis-canvas"></div>

        <!-- UI Overlay -->
        <div id="ui-overlay">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="logo">
                    <div class="logo-dot"></div>
                    <span class="logo-text">JARVIS</span>
                </div>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span class="status-text">ONLINE</span>
                </div>
            </div>

            <!-- Center Status -->
            <div class="center-status">
                <div class="status-label">NEURAL CORE</div>
                <div class="status-state" id="core-state">INITIALIZING</div>
            </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <button class="nav-btn" onclick="togglePanel('memory')" title="Memory">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </button>
            <button class="nav-btn" onclick="togglePanel('voice')" title="Voice Samples">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>
            <button class="nav-btn" onclick="togglePanel('sessions')" title="Sessions">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
            </button>
        </div>

        <!-- Memory Panel -->
        <div class="side-panel left" id="memory-panel">
            <div class="panel-header">
                <h3>Memory</h3>
                <button class="panel-close" onclick="togglePanel('memory')">&times;</button>
            </div>
            <div class="panel-content">
                <div id="memory-content" hx-get="/api/memory" hx-trigger="load" hx-swap="innerHTML">
                    <p style="color: var(--text-secondary); font-size: 12px;">Loading...</p>
                </div>
            </div>
        </div>

        <!-- Voice Panel -->
        <div class="side-panel right" id="voice-panel">
            <div class="panel-header">
                <h3>Voice Samples</h3>
                <button class="panel-close" onclick="togglePanel('voice')">&times;</button>
            </div>
            <div class="panel-content">
                <div id="voice-content" hx-get="/api/voice/samples" hx-trigger="load" hx-swap="innerHTML">
                    <p style="color: var(--text-secondary); font-size: 12px;">Loading...</p>
                </div>
                <button class="btn" style="width: 100%; margin-top: 12px;" onclick="document.getElementById('upload-modal').showModal()">
                    + Add Voice Sample
                </button>
            </div>
        </div>

        <!-- Sessions Panel -->
        <div class="side-panel left" id="sessions-panel">
            <div class="panel-header">
                <h3>Sessions</h3>
                <button class="panel-close" onclick="togglePanel('sessions')">&times;</button>
            </div>
            <div class="panel-content">
                <div id="sessions-content" hx-get="/api/sessions" hx-trigger="load" hx-swap="innerHTML">
                    <p style="color: var(--text-secondary); font-size: 12px;">Loading...</p>
                </div>
            </div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel" id="chat-panel">
            <div class="chat-header" onclick="toggleChat()">
                <div class="chat-header-left">
                    <h3>Communication</h3>
                    <span class="message-count" id="message-count">0</span>
                </div>
                <button class="toggle-chat-btn">&#9660;</button>
            </div>

            <div class="messages-container" id="messages"></div>

            <div class="chat-input-area">
                <div class="input-row">
                    <button id="mic-btn" onclick="toggleVoice()" class="btn-icon" title="Toggle voice input">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                    <textarea
                        id="message-input"
                        placeholder="Speak to JARVIS..."
                        rows="1"
                        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"
                    ></textarea>
                    <button onclick="sendMessage()" class="btn-send" title="Send">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Upload Dialog -->
        <dialog id="upload-modal">
            <form method="dialog" id="upload-form">
                <h3>Add Voice Sample</h3>
                <input type="text" name="name" placeholder="Voice name" required>
                <input type="file" name="audio" accept="audio/*" required>
                <div class="modal-actions">
                    <button type="button" onclick="uploadVoice()" class="btn-primary">Upload</button>
                    <button type="button" onclick="this.closest('dialog').close()" class="btn">Cancel</button>
                </div>
            </form>
        </dialog>
    </div>

    <!-- JARVIS Core Scripts -->
    <script src="/static/js/jarvis-core.js"></script>
    <script src="/static/js/audio-analyzer.js"></script>
    <script src="/static/js/state-machine.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/voice.js"></script>
</body>
</html>
